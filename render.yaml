services:
  - type: web
    name: jesus-cristo-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-3-5-sonnet-latest
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: INSTAGRAM_GRAPH_VERSION
        value: v21.0
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
